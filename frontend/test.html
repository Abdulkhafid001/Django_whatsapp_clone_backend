<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>WebSocket Demo</h1>

    <input type="text" id="msg" placeholder="Enter message">
    <button onclick="sendMessage()">Send</button>

    <ul id="messages"></ul>

    <div class="notifications-container">
        <div class="notification-title-and-count">
            <h3>Notifications will go here</h3>
            <div class="circle">
                <p class="notification-count" id="notif-count">12</p>
            </div>
        </div>
        <div class="notifications" id="notifications">
        </div>
    </div>
    <script>
        //const socket = new WebSocket("ws://127.0.0.1:8000/ws/testmessage/"); // socket for testmessage
        const socket = new WebSocket("ws://127.0.0.1:8000/ws/notifications/")

        socket.onmessage = function (e) {
            const data = JSON.parse(e.data);
            console.log(data.message)
            const dataLength = Object.entries(data).length;
            const notificationLenght = Object.entries(data.notifications).length
            console.log(notificationLenght)
            document.getElementById('notif-count').innerText = notificationLenght;
            for (i = 0; i < notificationLenght; i++) {
                console.log(data.notifications[i].authorName)
                console.log(data.notifications[i].post)
                const link = document.createElement('a')
                link.href = `http://127.0.0.1:8000/chat/postnotification/${data.notifications[i].post}`
                link.innerText = `${data.notifications[i].authorName} just published a post`
                document.getElementById('notifications').appendChild(link);
            }

        };

        socket.onerror = function (error) {
            console.error(error)
        }

        function sendMessage() {
            const message = document.getElementById("msg").value;
            socket.send(JSON.stringify({
                'message': message
            }));
        }
    </script>
</body>

</html>
