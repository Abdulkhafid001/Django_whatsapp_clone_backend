<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>WebSocket Demo</h1>

    <input type="text" id="msg" placeholder="Enter message">
    <button onclick="sendMessage()">Send</button>

    <ul id="messages"></ul>

    <div class="notifications-container">
        <div class="notification-title-and-count">
            <h3>Notifications will go here</h3>
            <div class="circle">
                <p class="notification-count">12</p>
            </div>
        </div>
        <div class="notifications">
            <a href="abubakar just posted a new blog post">Abubakar just posted a new blog post </a>
        </div>
    </div>
    <script>
        const socket = new WebSocket("ws://127.0.0.1:8000/ws/testmessage/");

        socket.onmessage = function (e) {
            const data = JSON.parse(e.data);
            const length = Object.entries(data).length;
            for (i = 0; i < length; i++) {
                const li = document.createElement("li");
                li.innerText = data.message[i].username;
                document.getElementById("messages").appendChild(li);
            }
        };

        socket.onerror = function (error) {
            console.error(error)
        }

        function sendMessage() {
            const message = document.getElementById("msg").value;
            socket.send(JSON.stringify({
                'message': message
            }));
        }
    </script>
</body>

</html>
